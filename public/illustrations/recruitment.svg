<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%" style="border-radius: 16px; overflow: hidden; background: radial-gradient(ellipse at 30% 20%, #312e81 0%, #1e1b4b 40%, #0f0a26 100%); box-shadow: 0 10px 30px rgba(0,0,0,0.45);">
  <defs>
    <pattern id="rc-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(167,139,250,0.10)" stroke-width="0.5"/>
    </pattern>

    <linearGradient id="rc-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(31,25,68,0.95)"/>
      <stop offset="100%" stop-color="rgba(12,10,40,0.97)"/>
    </linearGradient>

    <linearGradient id="rc-paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>

    <radialGradient id="rc-hub" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="60%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>

    <radialGradient id="rc-hub-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="rc-beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>

    <filter id="rc-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <g id="rc-packet-cv">
      <rect x="-10" y="-8" width="20" height="16" rx="2" fill="#fff" stroke="#7c3aed" stroke-width="1"/>
      <circle cx="-5" cy="-3" r="2" fill="#7c3aed"/>
      <line x1="-1" y1="-3" x2="6" y2="-3" stroke="#7c3aed" stroke-width="1"/>
      <line x1="-7" y1="2" x2="7" y2="2" stroke="#7c3aed" stroke-width="0.8" opacity="0.6"/>
      <line x1="-7" y1="5" x2="5" y2="5" stroke="#7c3aed" stroke-width="0.8" opacity="0.6"/>
    </g>
    <g id="rc-packet-score">
      <rect x="-12" y="-7" width="24" height="14" rx="3" fill="#a78bfa" stroke="#fff" stroke-width="1"/>
      <text y="2" font-family="Inter,Arial,sans-serif" font-size="7" fill="#0f0a26" text-anchor="middle" font-weight="900">94%</text>
    </g>

    <path id="rc-p1" d="M 200 130 C 280 170 340 210 400 250"/>
    <path id="rc-p2" d="M 600 130 C 530 170 460 210 400 250"/>
    <path id="rc-p3" d="M 200 380 C 280 350 340 300 400 250"/>
    <path id="rc-p4" d="M 600 380 C 530 350 460 300 400 250"/>
  </defs>

  <style>
    .rc-beam-line { fill: none; stroke: url(#rc-beam); stroke-width: 1.5; stroke-dasharray: 4 6; animation: rc-dash 1.8s linear infinite; }
    @keyframes rc-dash { to { stroke-dashoffset: -20; } }
    .rc-pulse { transform-origin: center; animation: rc-pulse 2.6s cubic-bezier(0.2,0,0.8,1) infinite; }
    @keyframes rc-pulse { 0% { transform: scale(0.85); opacity: 0.9; } 100% { transform: scale(2.4); opacity: 0; } }
    .rc-float { animation: rc-float 6s ease-in-out infinite; }
    .rc-float-delay { animation: rc-float 6s ease-in-out infinite 1.5s; }
    @keyframes rc-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    .rc-scan { animation: rc-scan 2.2s ease-in-out infinite; }
    @keyframes rc-scan { 0% { transform: translateY(0); opacity: 0.85; } 50% { opacity: 1; } 100% { transform: translateY(70px); opacity: 0; } }
    .rc-grow { transform-origin: 0% 50%; animation: rc-grow 2s ease-out infinite alternate; }
    @keyframes rc-grow { from { transform: scaleX(0.3); } to { transform: scaleX(1); } }
    .rc-blink { animation: rc-blink 1.4s ease-in-out infinite; }
    @keyframes rc-blink { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
  </style>

  <rect width="800" height="500" fill="url(#rc-grid)"/>

  <g fill="#a78bfa">
    <circle cx="120" cy="260" r="1.4" class="rc-blink"/>
    <circle cx="680" cy="240" r="1.6" class="rc-blink" style="animation-delay: 0.5s;"/>
    <circle cx="80" cy="200" r="1.2" class="rc-blink" style="animation-delay: 1s;"/>
    <circle cx="720" cy="320" r="1.4" class="rc-blink" style="animation-delay: 1.5s;"/>
  </g>

  <use href="#rc-p1" class="rc-beam-line"/>
  <use href="#rc-p2" class="rc-beam-line"/>
  <use href="#rc-p3" class="rc-beam-line"/>
  <use href="#rc-p4" class="rc-beam-line"/>

  <!-- TOP-LEFT — CV Scanner -->
  <g class="rc-float">
    <g transform="translate(160,40)">
      <rect width="180" height="150" rx="14" fill="url(#rc-card)" stroke="#a78bfa" stroke-opacity="0.35" stroke-width="1.2"/>
      <text x="14" y="20" font-family="Inter,Arial,sans-serif" font-size="8" fill="#a78bfa" font-weight="700" letter-spacing="1.5">CV SCANNER</text>
      <text x="166" y="20" font-family="Inter,Arial,sans-serif" font-size="7" fill="#34d399" font-weight="700" text-anchor="end">● SCANNING</text>
      <g transform="translate(20,30)">
        <rect x="20" y="8" width="100" height="108" rx="4" fill="url(#rc-paper)" opacity="0.25" stroke="#a78bfa" stroke-opacity="0.2" stroke-width="0.5"/>
        <rect x="10" y="4" width="100" height="108" rx="4" fill="url(#rc-paper)" opacity="0.4" stroke="#a78bfa" stroke-opacity="0.3" stroke-width="0.5"/>
        <g>
          <rect x="0" y="0" width="100" height="108" rx="4" fill="url(#rc-paper)" stroke="#a78bfa" stroke-opacity="0.5" stroke-width="0.8"/>
          <circle cx="14" cy="14" r="7" fill="#7c3aed"/>
          <text x="14" y="17" font-family="Inter,Arial,sans-serif" font-size="7" fill="#fff" text-anchor="middle" font-weight="900">R</text>
          <rect x="24" y="10" width="40" height="3" rx="1" fill="#7c3aed"/>
          <rect x="24" y="16" width="30" height="2" rx="1" fill="#7c3aed" opacity="0.6"/>
          <line x1="6" y1="30" x2="94" y2="30" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>
          <rect x="6" y="36" width="14" height="2" rx="1" fill="#7c3aed" opacity="0.7"/>
          <rect x="22" y="36" width="40" height="2" rx="1" fill="#7c3aed" opacity="0.4"/>
          <rect x="6" y="42" width="14" height="2" rx="1" fill="#7c3aed" opacity="0.7"/>
          <rect x="22" y="42" width="50" height="2" rx="1" fill="#7c3aed" opacity="0.4"/>
          <rect x="6" y="48" width="14" height="2" rx="1" fill="#7c3aed" opacity="0.7"/>
          <rect x="22" y="48" width="36" height="2" rx="1" fill="#7c3aed" opacity="0.4"/>
          <line x1="6" y1="58" x2="94" y2="58" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>
          <rect x="6" y="64" width="40" height="2" rx="1" fill="#7c3aed" opacity="0.4"/>
          <rect x="6" y="69" width="60" height="2" rx="1" fill="#7c3aed" opacity="0.4"/>
          <rect x="6" y="74" width="48" height="2" rx="1" fill="#7c3aed" opacity="0.4"/>
          <rect x="6" y="79" width="56" height="2" rx="1" fill="#7c3aed" opacity="0.4"/>
          <rect x="0" y="0" width="100" height="2" fill="#a78bfa" class="rc-scan" filter="url(#rc-glow)"/>
        </g>
      </g>
      <g transform="translate(132,40)">
        <text font-family="Inter,Arial,sans-serif" font-size="7" fill="#94a3b8">Score</text>
        <text y="14" font-family="Inter,Arial,sans-serif" font-size="14" fill="#a78bfa" font-weight="900">94</text>
        <text x="22" y="14" font-family="Inter,Arial,sans-serif" font-size="8" fill="#64748b">/100</text>
        <text y="32" font-family="Inter,Arial,sans-serif" font-size="6.5" fill="#64748b">Skills</text>
        <rect y="36" width="36" height="3" rx="1.5" fill="#1e1b4b"/>
        <rect y="36" width="34" height="3" rx="1.5" fill="#a78bfa"/>
        <text y="54" font-family="Inter,Arial,sans-serif" font-size="6.5" fill="#64748b">Senior</text>
        <rect y="58" width="36" height="3" rx="1.5" fill="#1e1b4b"/>
        <rect y="58" width="30" height="3" rx="1.5" fill="#7c3aed"/>
        <text y="76" font-family="Inter,Arial,sans-serif" font-size="6.5" fill="#64748b">Docs</text>
        <rect y="80" width="36" height="3" rx="1.5" fill="#1e1b4b"/>
        <rect y="80" width="36" height="3" rx="1.5" fill="#34d399"/>
      </g>
    </g>
  </g>

  <!-- TOP-RIGHT — Match score card -->
  <g class="rc-float-delay">
    <g transform="translate(460,40)">
      <rect width="200" height="150" rx="14" fill="url(#rc-card)" stroke="#a78bfa" stroke-opacity="0.35" stroke-width="1.2"/>
      <text x="14" y="20" font-family="Inter,Arial,sans-serif" font-size="8" fill="#a78bfa" font-weight="700" letter-spacing="1.5">AI MATCH</text>
      <g transform="translate(50,80)">
        <circle r="34" fill="none" stroke="#1e1b4b" stroke-width="6"/>
        <circle r="34" fill="none" stroke="#a78bfa" stroke-width="6" stroke-dasharray="200 214" stroke-linecap="round" transform="rotate(-90)" filter="url(#rc-glow)"/>
        <text y="-2" font-family="Inter,Arial,sans-serif" font-size="20" fill="#fff" text-anchor="middle" font-weight="900">94</text>
        <text y="12" font-family="Inter,Arial,sans-serif" font-size="7" fill="#a78bfa" text-anchor="middle" font-weight="700" letter-spacing="2">MATCH</text>
      </g>
      <g transform="translate(110,40)">
        <rect width="80" height="18" rx="4" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-opacity="0.5" stroke-width="0.6"/>
        <circle cx="10" cy="9" r="3" fill="#34d399"/>
        <text x="18" y="12" font-family="Inter,Arial,sans-serif" font-size="7" fill="#cbd5e1">Senior bracket</text>
      </g>
      <g transform="translate(110,64)">
        <rect width="80" height="18" rx="4" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-opacity="0.5" stroke-width="0.6"/>
        <circle cx="10" cy="9" r="3" fill="#60a5fa"/>
        <text x="18" y="12" font-family="Inter,Arial,sans-serif" font-size="7" fill="#cbd5e1">Right location</text>
      </g>
      <g transform="translate(110,88)">
        <rect width="80" height="18" rx="4" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-opacity="0.5" stroke-width="0.6"/>
        <circle cx="10" cy="9" r="3" fill="#a78bfa"/>
        <text x="18" y="12" font-family="Inter,Arial,sans-serif" font-size="7" fill="#cbd5e1">Docs verified</text>
      </g>
      <g transform="translate(110,112)">
        <rect width="80" height="18" rx="4" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-opacity="0.5" stroke-width="0.6"/>
        <circle cx="10" cy="9" r="3" fill="#fbbf24"/>
        <text x="18" y="12" font-family="Inter,Arial,sans-serif" font-size="7" fill="#cbd5e1">7-yr experience</text>
      </g>
    </g>
  </g>

  <!-- BOTTOM-LEFT — Hiring pipeline -->
  <g class="rc-float-delay">
    <g transform="translate(160,330)">
      <rect width="200" height="138" rx="14" fill="url(#rc-card)" stroke="#a78bfa" stroke-opacity="0.35" stroke-width="1.2"/>
      <text x="14" y="20" font-family="Inter,Arial,sans-serif" font-size="8" fill="#a78bfa" font-weight="700" letter-spacing="1.5">HIRING PIPELINE</text>
      <g transform="translate(14,32)">
        <rect width="40" height="40" rx="6" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-opacity="0.45" stroke-width="0.6"/>
        <circle cx="20" cy="16" r="6" fill="#a78bfa"/>
        <text x="20" y="19" font-family="Inter,Arial,sans-serif" font-size="7" fill="#0f0a26" text-anchor="middle" font-weight="900">12</text>
        <text x="20" y="34" font-family="Inter,Arial,sans-serif" font-size="6" fill="#cbd5e1" text-anchor="middle" font-weight="700">Screen</text>
      </g>
      <text x="58" y="56" font-family="Inter,Arial,sans-serif" font-size="10" fill="#7c3aed">→</text>
      <g transform="translate(68,32)">
        <rect width="40" height="40" rx="6" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-opacity="0.45" stroke-width="0.6"/>
        <circle cx="20" cy="16" r="6" fill="#60a5fa"/>
        <text x="20" y="19" font-family="Inter,Arial,sans-serif" font-size="7" fill="#0a1426" text-anchor="middle" font-weight="900">5</text>
        <text x="20" y="34" font-family="Inter,Arial,sans-serif" font-size="6" fill="#cbd5e1" text-anchor="middle" font-weight="700">Interview</text>
      </g>
      <text x="112" y="56" font-family="Inter,Arial,sans-serif" font-size="10" fill="#7c3aed">→</text>
      <g transform="translate(122,32)">
        <rect width="40" height="40" rx="6" fill="rgba(94,234,212,0.15)" stroke="#5eead4" stroke-opacity="0.45" stroke-width="0.6"/>
        <circle cx="20" cy="16" r="6" fill="#5eead4"/>
        <text x="20" y="19" font-family="Inter,Arial,sans-serif" font-size="7" fill="#022c22" text-anchor="middle" font-weight="900">3</text>
        <text x="20" y="34" font-family="Inter,Arial,sans-serif" font-size="6" fill="#cbd5e1" text-anchor="middle" font-weight="700">Offer</text>
      </g>
      <text x="166" y="56" font-family="Inter,Arial,sans-serif" font-size="10" fill="#7c3aed">→</text>
      <g transform="translate(176,32)">
        <rect width="20" height="40" rx="6" fill="rgba(52,211,153,0.18)" stroke="#34d399" stroke-opacity="0.55" stroke-width="0.6"/>
        <circle cx="10" cy="16" r="6" fill="#34d399"/>
        <text x="10" y="19" font-family="Inter,Arial,sans-serif" font-size="7" fill="#022c22" text-anchor="middle" font-weight="900">1</text>
        <text x="10" y="34" font-family="Inter,Arial,sans-serif" font-size="5" fill="#34d399" text-anchor="middle" font-weight="700">HIRED</text>
      </g>
      <g transform="translate(14,88)">
        <text font-family="Inter,Arial,sans-serif" font-size="6.5" fill="#64748b">Conversion · Screen → Hire</text>
        <rect y="10" width="172" height="6" rx="3" fill="#1e1b4b"/>
        <rect y="10" width="14" height="6" rx="3" fill="#34d399" class="rc-grow"/>
        <text y="30" font-family="Inter,Arial,sans-serif" font-size="6.5" fill="#64748b">Avg cycle</text>
        <text x="172" y="30" font-family="Inter,Arial,sans-serif" font-size="6.5" fill="#a78bfa" text-anchor="end" font-weight="700">14 DAYS</text>
        <text y="44" font-family="Inter,Arial,sans-serif" font-size="6.5" fill="#64748b">Auto-shortlist</text>
        <text x="172" y="44" font-family="Inter,Arial,sans-serif" font-size="6.5" fill="#5eead4" text-anchor="end" font-weight="700">88% ACCURACY</text>
      </g>
    </g>
  </g>

  <!-- BOTTOM-RIGHT — Onboarding checklist -->
  <g class="rc-float">
    <g transform="translate(460,330)">
      <rect width="200" height="138" rx="14" fill="url(#rc-card)" stroke="#a78bfa" stroke-opacity="0.35" stroke-width="1.2"/>
      <text x="14" y="20" font-family="Inter,Arial,sans-serif" font-size="8" fill="#a78bfa" font-weight="700" letter-spacing="1.5">ONBOARDING SYNC</text>
      <g transform="translate(14,30)">
        <rect width="172" height="20" rx="4" fill="#0f0a26"/>
        <circle cx="12" cy="10" r="5" fill="#34d399"/>
        <path d="M 9 10 L 11 12 L 15 8" fill="none" stroke="#022c22" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="22" y="13" font-family="Inter,Arial,sans-serif" font-size="7" fill="#cbd5e1">Offer letter sent</text>
        <text x="165" y="13" font-family="Inter,Arial,sans-serif" font-size="6.5" fill="#34d399" font-weight="700" text-anchor="end">DONE</text>
      </g>
      <g transform="translate(14,54)">
        <rect width="172" height="20" rx="4" fill="#0f0a26"/>
        <circle cx="12" cy="10" r="5" fill="#34d399"/>
        <path d="M 9 10 L 11 12 L 15 8" fill="none" stroke="#022c22" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="22" y="13" font-family="Inter,Arial,sans-serif" font-size="7" fill="#cbd5e1">Docs collected</text>
        <text x="165" y="13" font-family="Inter,Arial,sans-serif" font-size="6.5" fill="#34d399" font-weight="700" text-anchor="end">DONE</text>
      </g>
      <g transform="translate(14,78)">
        <rect width="172" height="20" rx="4" fill="#0f0a26"/>
        <circle cx="12" cy="10" r="5" fill="#fbbf24"/>
        <text x="12" y="13" font-family="Inter,Arial,sans-serif" font-size="7" fill="#0f0a26" text-anchor="middle" font-weight="900">?</text>
        <text x="22" y="13" font-family="Inter,Arial,sans-serif" font-size="7" fill="#cbd5e1">Background check</text>
        <text x="165" y="13" font-family="Inter,Arial,sans-serif" font-size="6.5" fill="#fbbf24" font-weight="700" text-anchor="end">RUNNING</text>
      </g>
      <g transform="translate(14,102)">
        <rect width="172" height="20" rx="4" fill="#0f0a26"/>
        <circle cx="12" cy="10" r="5" fill="#475569"/>
        <text x="22" y="13" font-family="Inter,Arial,sans-serif" font-size="7" fill="#cbd5e1">First-day kit</text>
        <text x="165" y="13" font-family="Inter,Arial,sans-serif" font-size="6.5" fill="#64748b" font-weight="700" text-anchor="end">QUEUED</text>
      </g>
    </g>
  </g>

  <g>
    <use href="#rc-packet-cv"/>
    <animateMotion dur="3.4s" repeatCount="indefinite" path="M 200 130 C 280 170 340 210 400 250"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3.4s" repeatCount="indefinite"/>
  </g>
  <g>
    <use href="#rc-packet-score"/>
    <animateMotion dur="3s" begin="1.4s" repeatCount="indefinite" path="M 600 130 C 530 170 460 210 400 250"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3s" begin="1.4s" repeatCount="indefinite"/>
  </g>
  <g>
    <use href="#rc-packet-cv"/>
    <animateMotion dur="3.6s" begin="0.7s" repeatCount="indefinite" path="M 200 380 C 280 350 340 300 400 250"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3.6s" begin="0.7s" repeatCount="indefinite"/>
  </g>
  <g>
    <use href="#rc-packet-score"/>
    <animateMotion dur="3.2s" begin="2.1s" repeatCount="indefinite" path="M 600 380 C 530 350 460 300 400 250"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3.2s" begin="2.1s" repeatCount="indefinite"/>
  </g>

  <!-- Central hub -->
  <g transform="translate(400,250)">
    <circle cx="0" cy="0" r="90" fill="url(#rc-hub-glow)"/>
    <circle r="44" fill="none" stroke="#a78bfa" stroke-width="2" class="rc-pulse"/>
    <circle r="44" fill="none" stroke="#a78bfa" stroke-width="2" class="rc-pulse" style="animation-delay: 0.9s;"/>
    <circle r="44" fill="none" stroke="#a78bfa" stroke-width="2" class="rc-pulse" style="animation-delay: 1.8s;"/>
    <circle cx="0" cy="0" r="58" fill="none" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.5" stroke-dasharray="3 5">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="44" fill="url(#rc-hub)" filter="url(#rc-glow)"/>
    <circle cx="0" cy="0" r="44" fill="none" stroke="#fff" stroke-width="2" stroke-opacity="0.6"/>
    <circle cx="-12" cy="-12" r="14" fill="rgba(255,255,255,0.18)"/>
    <g fill="#fff">
      <circle cx="-8" cy="-4" r="5"/>
      <path d="M -16 12 C -16 6 -12 4 -8 4 C -4 4 0 6 0 12 Z"/>
      <circle cx="9" cy="-2" r="4"/>
      <path d="M 2 12 C 2 8 5 6 9 6 C 13 6 16 8 16 12 Z"/>
    </g>
    <text x="0" y="68" font-family="Inter,Arial,sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle" font-weight="700" letter-spacing="3">HIRING CORE</text>
  </g>

  <g transform="translate(400,485)" font-family="Inter,Arial,sans-serif" font-size="7" fill="#a78bfa" opacity="0.85" letter-spacing="2">
    <text x="-180" text-anchor="middle">94% MATCH</text>
    <text x="-60" text-anchor="middle">·</text>
    <text x="0" text-anchor="middle">14-DAY CYCLE</text>
    <text x="60" text-anchor="middle">·</text>
    <text x="180" text-anchor="middle">12 ROLES LIVE</text>
  </g>
</svg>

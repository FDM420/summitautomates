<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%" style="border-radius: 16px; overflow: hidden; background: radial-gradient(ellipse at 30% 20%, #075985 0%, #0c4a6e 40%, #051a2b 100%); box-shadow: 0 10px 30px rgba(0,0,0,0.45);">
  <defs>
    <pattern id="cm-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(94,234,212,0.10)" stroke-width="0.5"/>
    </pattern>

    <linearGradient id="cm-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(10,33,56,0.95)"/>
      <stop offset="100%" stop-color="rgba(4,18,30,0.97)"/>
    </linearGradient>

    <radialGradient id="cm-hub" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="60%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#155e75"/>
    </radialGradient>

    <radialGradient id="cm-hub-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="cm-beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="cm-funnel-1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="cm-funnel-2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="cm-funnel-3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="cm-funnel-4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.25"/>
    </linearGradient>

    <filter id="cm-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <g id="cm-packet-lead">
      <circle r="6" fill="#22d3ee" stroke="#fff" stroke-width="1.2"/>
      <circle r="2" fill="#fff"/>
    </g>
    <g id="cm-packet-deal">
      <rect x="-10" y="-7" width="20" height="14" rx="3" fill="#10b981" stroke="#fff" stroke-width="1"/>
      <text y="2" font-family="Inter,Arial,sans-serif" font-size="7" fill="#fff" text-anchor="middle" font-weight="900">$</text>
    </g>

    <path id="cm-p1" d="M 200 130 C 280 170 340 210 400 250"/>
    <path id="cm-p2" d="M 600 130 C 530 170 460 210 400 250"/>
    <path id="cm-p3" d="M 200 380 C 280 350 340 300 400 250"/>
    <path id="cm-p4" d="M 600 380 C 530 350 460 300 400 250"/>
  </defs>

  <style>
    .cm-beam-line { fill: none; stroke: url(#cm-beam); stroke-width: 1.5; stroke-dasharray: 4 6; animation: cm-dash 1.8s linear infinite; }
    @keyframes cm-dash { to { stroke-dashoffset: -20; } }
    .cm-pulse { transform-origin: center; animation: cm-pulse 2.6s cubic-bezier(0.2,0,0.8,1) infinite; }
    @keyframes cm-pulse { 0% { transform: scale(0.85); opacity: 0.9; } 100% { transform: scale(2.4); opacity: 0; } }
    .cm-float { animation: cm-float 6s ease-in-out infinite; }
    .cm-float-delay { animation: cm-float 6s ease-in-out infinite 1.5s; }
    @keyframes cm-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    .cm-drop { animation: cm-drop 1.8s ease-in infinite; opacity: 0; }
    @keyframes cm-drop { 0% { opacity: 0; transform: translateY(-10px); } 30% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; transform: translateY(60px); } }
    .cm-blink { animation: cm-blink 1.4s ease-in-out infinite; }
    @keyframes cm-blink { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
  </style>

  <rect width="800" height="500" fill="url(#cm-grid)"/>

  <g fill="#22d3ee">
    <circle cx="120" cy="260" r="1.4" class="cm-blink"/>
    <circle cx="680" cy="240" r="1.6" class="cm-blink" style="animation-delay: 0.5s;"/>
    <circle cx="80" cy="200" r="1.2" class="cm-blink" style="animation-delay: 1s;"/>
    <circle cx="720" cy="320" r="1.4" class="cm-blink" style="animation-delay: 1.5s;"/>
  </g>

  <use href="#cm-p1" class="cm-beam-line"/>
  <use href="#cm-p2" class="cm-beam-line"/>
  <use href="#cm-p3" class="cm-beam-line"/>
  <use href="#cm-p4" class="cm-beam-line"/>

  <!-- TOP-LEFT — Lead Funnel -->
  <g class="cm-float">
    <g transform="translate(160,40)">
      <rect width="180" height="150" rx="14" fill="url(#cm-card)" stroke="#22d3ee" stroke-opacity="0.35" stroke-width="1.2"/>
      <text x="14" y="20" font-family="Inter,Arial,sans-serif" font-size="8" fill="#22d3ee" font-weight="700" letter-spacing="1.5">LEAD FUNNEL</text>
      <text x="166" y="20" font-family="Inter,Arial,sans-serif" font-size="7" fill="#34d399" font-weight="700" text-anchor="end">+38%</text>

      <!-- Dropping dots -->
      <g transform="translate(76,30)">
        <circle r="3" fill="#22d3ee" class="cm-drop"/>
        <circle r="3" fill="#22d3ee" class="cm-drop" style="animation-delay: 0.4s;"/>
        <circle r="3" fill="#22d3ee" class="cm-drop" style="animation-delay: 0.9s;"/>
      </g>

      <!-- Funnel stages -->
      <g transform="translate(30,52)">
        <path d="M 0 0 L 120 0 L 110 18 L 10 18 Z" fill="url(#cm-funnel-1)" stroke="#22d3ee" stroke-opacity="0.5" stroke-width="0.6"/>
        <text x="60" y="13" font-family="Inter,Arial,sans-serif" font-size="8" fill="#cbd5e1" text-anchor="middle" font-weight="700">Visitors</text>
        <text x="106" y="13" font-family="Inter,Arial,sans-serif" font-size="7" fill="#22d3ee" text-anchor="end" font-weight="700">8.4k</text>

        <path d="M 10 22 L 110 22 L 100 40 L 20 40 Z" fill="url(#cm-funnel-2)" stroke="#0ea5e9" stroke-opacity="0.5" stroke-width="0.6"/>
        <text x="60" y="35" font-family="Inter,Arial,sans-serif" font-size="8" fill="#cbd5e1" text-anchor="middle" font-weight="700">Leads</text>
        <text x="96" y="35" font-family="Inter,Arial,sans-serif" font-size="7" fill="#0ea5e9" text-anchor="end" font-weight="700">2.1k</text>

        <path d="M 20 44 L 100 44 L 92 62 L 28 62 Z" fill="url(#cm-funnel-3)" stroke="#14b8a6" stroke-opacity="0.5" stroke-width="0.6"/>
        <text x="60" y="57" font-family="Inter,Arial,sans-serif" font-size="8" fill="#cbd5e1" text-anchor="middle" font-weight="700">Qualified</text>
        <text x="88" y="57" font-family="Inter,Arial,sans-serif" font-size="7" fill="#14b8a6" text-anchor="end" font-weight="700">640</text>

        <path d="M 28 66 L 92 66 L 86 84 L 34 84 Z" fill="url(#cm-funnel-4)" stroke="#10b981" stroke-opacity="0.6" stroke-width="0.6"/>
        <text x="60" y="79" font-family="Inter,Arial,sans-serif" font-size="8" fill="#cbd5e1" text-anchor="middle" font-weight="700">Won</text>
        <text x="82" y="79" font-family="Inter,Arial,sans-serif" font-size="7" fill="#10b981" text-anchor="end" font-weight="700">180</text>

        <!-- Plinth -->
        <rect x="34" y="88" width="52" height="8" rx="2" fill="rgba(16,185,129,0.3)" stroke="#10b981" stroke-opacity="0.6" stroke-width="0.5"/>
        <text x="60" y="94" font-family="Inter,Arial,sans-serif" font-size="6" fill="#10b981" text-anchor="middle" font-weight="900">2.1% WIN RATE</text>
      </g>
    </g>
  </g>

  <!-- TOP-RIGHT — Pipeline Kanban -->
  <g class="cm-float-delay">
    <g transform="translate(460,40)">
      <rect width="200" height="150" rx="14" fill="url(#cm-card)" stroke="#22d3ee" stroke-opacity="0.35" stroke-width="1.2"/>
      <text x="14" y="20" font-family="Inter,Arial,sans-serif" font-size="8" fill="#22d3ee" font-weight="700" letter-spacing="1.5">PIPELINE BOARD</text>

      <!-- 4 columns -->
      <g transform="translate(14,30)" font-family="Inter,Arial,sans-serif" font-size="6">
        <rect width="40" height="110" rx="4" fill="rgba(34,211,238,0.08)" stroke="#22d3ee" stroke-opacity="0.25" stroke-width="0.5"/>
        <text x="20" y="10" fill="#22d3ee" text-anchor="middle" font-weight="700">PROSPECT</text>
        <rect x="4" y="16" width="32" height="12" rx="2" fill="#1e2c40"/>
        <rect x="6" y="20" width="20" height="2" rx="1" fill="#cbd5e1"/>
        <rect x="6" y="24" width="14" height="1.5" rx="0.75" fill="#64748b"/>
        <rect x="4" y="32" width="32" height="12" rx="2" fill="#1e2c40"/>
        <rect x="6" y="36" width="22" height="2" rx="1" fill="#cbd5e1"/>
        <rect x="6" y="40" width="16" height="1.5" rx="0.75" fill="#64748b"/>
        <rect x="4" y="48" width="32" height="12" rx="2" fill="#1e2c40"/>
        <rect x="6" y="52" width="18" height="2" rx="1" fill="#cbd5e1"/>
        <text x="20" y="78" fill="#22d3ee" text-anchor="middle" font-weight="900" font-size="10">24</text>
      </g>
      <g transform="translate(60,30)" font-family="Inter,Arial,sans-serif" font-size="6">
        <rect width="40" height="110" rx="4" fill="rgba(14,165,233,0.10)" stroke="#0ea5e9" stroke-opacity="0.3" stroke-width="0.5"/>
        <text x="20" y="10" fill="#0ea5e9" text-anchor="middle" font-weight="700">QUALIFIED</text>
        <rect x="4" y="16" width="32" height="12" rx="2" fill="#1e2c40"/>
        <rect x="6" y="20" width="22" height="2" rx="1" fill="#cbd5e1"/>
        <rect x="4" y="32" width="32" height="12" rx="2" fill="#1e2c40"/>
        <rect x="6" y="36" width="20" height="2" rx="1" fill="#cbd5e1"/>
        <text x="20" y="78" fill="#0ea5e9" text-anchor="middle" font-weight="900" font-size="10">12</text>
      </g>
      <g transform="translate(106,30)" font-family="Inter,Arial,sans-serif" font-size="6">
        <rect width="40" height="110" rx="4" fill="rgba(20,184,166,0.10)" stroke="#14b8a6" stroke-opacity="0.3" stroke-width="0.5"/>
        <text x="20" y="10" fill="#14b8a6" text-anchor="middle" font-weight="700">PROPOSAL</text>
        <rect x="4" y="16" width="32" height="12" rx="2" fill="#1e2c40"/>
        <rect x="6" y="20" width="22" height="2" rx="1" fill="#cbd5e1"/>
        <text x="20" y="78" fill="#14b8a6" text-anchor="middle" font-weight="900" font-size="10">5</text>
      </g>
      <g transform="translate(152,30)" font-family="Inter,Arial,sans-serif" font-size="6">
        <rect width="34" height="110" rx="4" fill="rgba(16,185,129,0.18)" stroke="#10b981" stroke-opacity="0.5" stroke-width="0.6"/>
        <text x="17" y="10" fill="#10b981" text-anchor="middle" font-weight="700">WON</text>
        <rect x="3" y="16" width="28" height="14" rx="2" fill="rgba(16,185,129,0.25)" stroke="#10b981" stroke-opacity="0.5" stroke-width="0.4"/>
        <text x="17" y="25" fill="#10b981" text-anchor="middle" font-weight="900">$48k</text>
        <text x="17" y="78" fill="#10b981" text-anchor="middle" font-weight="900" font-size="10">3</text>
      </g>
    </g>
  </g>

  <!-- BOTTOM-LEFT — Growth chart -->
  <g class="cm-float-delay">
    <g transform="translate(160,330)">
      <rect width="200" height="138" rx="14" fill="url(#cm-card)" stroke="#22d3ee" stroke-opacity="0.35" stroke-width="1.2"/>
      <text x="14" y="20" font-family="Inter,Arial,sans-serif" font-size="8" fill="#22d3ee" font-weight="700" letter-spacing="1.5">REVENUE GROWTH</text>
      <text x="186" y="20" font-family="Inter,Arial,sans-serif" font-size="7" fill="#34d399" font-weight="700" text-anchor="end">+38%</text>

      <!-- Chart -->
      <g transform="translate(14,36)">
        <line x1="0" y1="80" x2="172" y2="80" stroke="#22d3ee" stroke-opacity="0.2" stroke-width="0.5"/>
        <line x1="0" y1="60" x2="172" y2="60" stroke="#22d3ee" stroke-opacity="0.15" stroke-width="0.5"/>
        <line x1="0" y1="40" x2="172" y2="40" stroke="#22d3ee" stroke-opacity="0.15" stroke-width="0.5"/>
        <line x1="0" y1="20" x2="172" y2="20" stroke="#22d3ee" stroke-opacity="0.15" stroke-width="0.5"/>

        <path d="M 0 70 L 24 64 L 48 68 L 72 52 L 96 44 L 120 32 L 144 22 L 172 12 L 172 80 L 0 80 Z" fill="rgba(34,211,238,0.18)"/>
        <path d="M 0 70 L 24 64 L 48 68 L 72 52 L 96 44 L 120 32 L 144 22 L 172 12" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#cm-glow)"/>

        <circle cx="24" cy="64" r="2" fill="#22d3ee"/>
        <circle cx="72" cy="52" r="2" fill="#22d3ee"/>
        <circle cx="120" cy="32" r="2" fill="#22d3ee"/>
        <circle cx="172" cy="12" r="3" fill="#5eead4"><animate attributeName="r" values="2.5;4;2.5" dur="1.6s" repeatCount="indefinite"/></circle>

        <text x="172" y="6" font-family="Inter,Arial,sans-serif" font-size="6.5" fill="#5eead4" text-anchor="end" font-weight="700">$284k</text>
      </g>

      <g transform="translate(14,122)" font-family="Inter,Arial,sans-serif" font-size="6" fill="#64748b">
        <text>Jan</text>
        <text x="28">Feb</text>
        <text x="56">Mar</text>
        <text x="84">Apr</text>
        <text x="112">May</text>
        <text x="140" font-weight="700" fill="#22d3ee">Jun</text>
      </g>
    </g>
  </g>

  <!-- BOTTOM-RIGHT — Contact card / Channel routing -->
  <g class="cm-float">
    <g transform="translate(460,330)">
      <rect width="200" height="138" rx="14" fill="url(#cm-card)" stroke="#22d3ee" stroke-opacity="0.35" stroke-width="1.2"/>
      <text x="14" y="20" font-family="Inter,Arial,sans-serif" font-size="8" fill="#22d3ee" font-weight="700" letter-spacing="1.5">CHANNEL ROUTING</text>

      <g transform="translate(14,30)">
        <rect width="172" height="22" rx="5" fill="#0a2138" stroke="#34d399" stroke-opacity="0.4" stroke-width="0.6"/>
        <circle cx="14" cy="11" r="6" fill="#34d399"/>
        <path d="M 11 11 L 13 13 L 17 9" fill="none" stroke="#022c22" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="26" y="14" font-family="Inter,Arial,sans-serif" font-size="7" fill="#cbd5e1" font-weight="700">Hot · Sales call</text>
        <text x="165" y="14" font-family="Inter,Arial,sans-serif" font-size="6.5" fill="#34d399" font-weight="700" text-anchor="end">12 NEW</text>
      </g>
      <g transform="translate(14,56)">
        <rect width="172" height="22" rx="5" fill="#0a2138" stroke="#22d3ee" stroke-opacity="0.4" stroke-width="0.6"/>
        <circle cx="14" cy="11" r="6" fill="#22d3ee"/>
        <text x="14" y="14" font-family="Inter,Arial,sans-serif" font-size="7" fill="#051a2b" text-anchor="middle" font-weight="900">@</text>
        <text x="26" y="14" font-family="Inter,Arial,sans-serif" font-size="7" fill="#cbd5e1" font-weight="700">Warm · Email drip</text>
        <text x="165" y="14" font-family="Inter,Arial,sans-serif" font-size="6.5" fill="#22d3ee" font-weight="700" text-anchor="end">48 SENT</text>
      </g>
      <g transform="translate(14,82)">
        <rect width="172" height="22" rx="5" fill="#0a2138" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="0.6"/>
        <circle cx="14" cy="11" r="6" fill="#a78bfa"/>
        <path d="M 11 14 C 13 12 15 10 17 12 C 18 13 18 14 17 14 L 13 14 Z" fill="#0f0a26"/>
        <text x="26" y="14" font-family="Inter,Arial,sans-serif" font-size="7" fill="#cbd5e1" font-weight="700">Cold · WhatsApp</text>
        <text x="165" y="14" font-family="Inter,Arial,sans-serif" font-size="6.5" fill="#a78bfa" font-weight="700" text-anchor="end">21 PINGED</text>
      </g>
      <g transform="translate(14,108)">
        <rect width="172" height="22" rx="5" fill="#0a2138" stroke="#fbbf24" stroke-opacity="0.4" stroke-width="0.6"/>
        <circle cx="14" cy="11" r="6" fill="#fbbf24"/>
        <text x="26" y="14" font-family="Inter,Arial,sans-serif" font-size="7" fill="#cbd5e1" font-weight="700">Re-engage · SMS</text>
        <text x="165" y="14" font-family="Inter,Arial,sans-serif" font-size="6.5" fill="#fbbf24" font-weight="700" text-anchor="end">7 BOUNCED</text>
      </g>
    </g>
  </g>

  <g>
    <use href="#cm-packet-lead"/>
    <animateMotion dur="3.2s" repeatCount="indefinite" path="M 200 130 C 280 170 340 210 400 250"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3.2s" repeatCount="indefinite"/>
  </g>
  <g>
    <use href="#cm-packet-deal"/>
    <animateMotion dur="3s" begin="1.4s" repeatCount="indefinite" path="M 600 130 C 530 170 460 210 400 250"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3s" begin="1.4s" repeatCount="indefinite"/>
  </g>
  <g>
    <use href="#cm-packet-lead"/>
    <animateMotion dur="3.6s" begin="0.7s" repeatCount="indefinite" path="M 200 380 C 280 350 340 300 400 250"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3.6s" begin="0.7s" repeatCount="indefinite"/>
  </g>
  <g>
    <use href="#cm-packet-deal"/>
    <animateMotion dur="3.2s" begin="2.1s" repeatCount="indefinite" path="M 600 380 C 530 350 460 300 400 250"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3.2s" begin="2.1s" repeatCount="indefinite"/>
  </g>

  <!-- Central hub -->
  <g transform="translate(400,250)">
    <circle cx="0" cy="0" r="90" fill="url(#cm-hub-glow)"/>
    <circle r="44" fill="none" stroke="#22d3ee" stroke-width="2" class="cm-pulse"/>
    <circle r="44" fill="none" stroke="#22d3ee" stroke-width="2" class="cm-pulse" style="animation-delay: 0.9s;"/>
    <circle r="44" fill="none" stroke="#22d3ee" stroke-width="2" class="cm-pulse" style="animation-delay: 1.8s;"/>
    <circle cx="0" cy="0" r="58" fill="none" stroke="#22d3ee" stroke-width="0.8" stroke-opacity="0.5" stroke-dasharray="3 5">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="44" fill="url(#cm-hub)" filter="url(#cm-glow)"/>
    <circle cx="0" cy="0" r="44" fill="none" stroke="#fff" stroke-width="2" stroke-opacity="0.6"/>
    <circle cx="-12" cy="-12" r="14" fill="rgba(255,255,255,0.18)"/>
    <!-- TrendingUp glyph -->
    <g fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="-18,10 -6,-4 4,4 18,-10"/>
      <polyline points="10,-10 18,-10 18,-2"/>
    </g>
    <text x="0" y="68" font-family="Inter,Arial,sans-serif" font-size="9" fill="#22d3ee" text-anchor="middle" font-weight="700" letter-spacing="3">REVENUE CORE</text>
  </g>

  <g transform="translate(400,485)" font-family="Inter,Arial,sans-serif" font-size="7" fill="#22d3ee" opacity="0.85" letter-spacing="2">
    <text x="-180" text-anchor="middle">8.4K LEADS/MO</text>
    <text x="-60" text-anchor="middle">·</text>
    <text x="0" text-anchor="middle">+38% PIPE</text>
    <text x="60" text-anchor="middle">·</text>
    <text x="180" text-anchor="middle">$284K MRR</text>
  </g>
</svg>

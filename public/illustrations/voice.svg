<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%" style="border-radius: 16px; overflow: hidden; background: radial-gradient(ellipse at 30% 20%, #064e3b 0%, #022c22 40%, #021a14 100%); box-shadow: 0 10px 30px rgba(0,0,0,0.45);">
  <defs>
    <pattern id="vo-grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(94,234,212,0.08)" stroke-width="0.5"/></pattern>
    <linearGradient id="vo-card" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(15,40,40,0.92)"/><stop offset="100%" stop-color="rgba(6,20,20,0.96)"/></linearGradient>
    <radialGradient id="vo-hub" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#34d399"/><stop offset="60%" stop-color="#10b981"/><stop offset="100%" stop-color="#047857"/></radialGradient>
    <radialGradient id="vo-hub-glow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#5eead4" stop-opacity="0.95"/><stop offset="100%" stop-color="#5eead4" stop-opacity="0"/></radialGradient>
    <linearGradient id="vo-beam" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#5eead4" stop-opacity="0"/><stop offset="50%" stop-color="#5eead4" stop-opacity="0.85"/><stop offset="100%" stop-color="#34d399" stop-opacity="0"/></linearGradient>
    <filter id="vo-glow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="4" result="blur"/><feComposite in="SourceGraphic" in2="blur" operator="over"/></filter>
    <g id="vo-packet-call"><circle cx="0" cy="0" r="9" fill="#5eead4" stroke="#fff" stroke-width="1"/><path d="M -4 -3 C -4 -4 -3 -4.5 -2 -4 L -0.5 -3 C 0 -2.5 0 -2 -0.3 -1.3 C 0.3 -0.3 1.3 0.7 2.3 1.3 C 3 1.7 3.5 1.7 4 1.2 L 5 -0.3 C 5.5 -1.3 5 -2.3 4 -2.3" fill="none" stroke="#022c22" stroke-width="1.4" stroke-linecap="round" transform="translate(-0.5,1)"/></g>
    <path id="vo-p1" d="M 175 95 C 270 130 340 200 400 250"/>
    <path id="vo-p2" d="M 625 95 C 530 130 460 200 400 250"/>
    <path id="vo-p3" d="M 175 405 C 270 370 340 300 400 250"/>
    <path id="vo-p4" d="M 625 405 C 530 370 460 300 400 250"/>
  </defs>
  <style>
    .vo-beam-line { fill:none; stroke:url(#vo-beam); stroke-width:1.5; stroke-dasharray:4 6; animation: vo-dash 1.8s linear infinite; }
    @keyframes vo-dash { to { stroke-dashoffset:-20; } }
    .vo-pulse { transform-origin:center; animation: vo-pulse 2.6s cubic-bezier(0.2,0,0.8,1) infinite; }
    @keyframes vo-pulse { 0%{transform:scale(0.85);opacity:0.9;} 100%{transform:scale(2.4);opacity:0;} }
    .vo-float { animation: vo-float 6s ease-in-out infinite; }
    .vo-float-delay { animation: vo-float 6s ease-in-out infinite 1.5s; }
    @keyframes vo-float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
    .vo-blink { animation: vo-blink 1.4s ease-in-out infinite; }
    @keyframes vo-blink { 0%,100%{opacity:0.4;} 50%{opacity:1;} }
    .vo-bar { animation: vo-bar 1.6s ease-in-out infinite alternate; transform-origin:bottom; }
    @keyframes vo-bar { from{transform:scaleY(0.45);} to{transform:scaleY(1);} }
    .vo-wave { animation: vo-wave 0.9s ease-in-out infinite alternate; transform-origin:center; }
    @keyframes vo-wave { from{transform:scaleY(0.35);} to{transform:scaleY(1);} }
    .vo-particle { animation: vo-particle 8s linear infinite; opacity:0; }
    @keyframes vo-particle { 0%{opacity:0;transform:translateY(0);} 30%{opacity:0.7;} 100%{opacity:0;transform:translateY(-60px);} }
    .vo-orbit { transform-origin:400px 250px; animation: vo-orbit 14s linear infinite; }
    @keyframes vo-orbit { to { transform:rotate(360deg); } }
    @keyframes vo-barx { from{transform:scaleX(0.55);} to{transform:scaleX(1);} }
  </style>
  <rect width="800" height="500" fill="url(#vo-grid)"/>
  <g fill="#5eead4"><circle cx="100" cy="450" r="1.5" class="vo-particle"/><circle cx="260" cy="470" r="1.2" class="vo-particle" style="animation-delay:1.5s;"/><circle cx="550" cy="460" r="1.5" class="vo-particle" style="animation-delay:3s;"/><circle cx="690" cy="455" r="1.2" class="vo-particle" style="animation-delay:4.5s;"/><circle cx="400" cy="475" r="1.3" class="vo-particle" style="animation-delay:6s;"/></g>

  <!-- BEAMS -->
  <use href="#vo-p1" class="vo-beam-line"/><use href="#vo-p2" class="vo-beam-line"/><use href="#vo-p3" class="vo-beam-line"/><use href="#vo-p4" class="vo-beam-line"/>

  <!-- ============ TOP-LEFT CARD : LIVE CALL ============ -->
  <g class="vo-float">
    <g transform="translate(40,30)">
      <rect width="170" height="130" rx="12" fill="url(#vo-card)" stroke="#10b981" stroke-width="1" stroke-opacity="0.4"/>
      <text x="14" y="22" fill="#5eead4" font-family="Arial, sans-serif" font-size="9" font-weight="700" letter-spacing="1.5">LIVE CALL</text>
      <circle cx="148" cy="18" r="3.5" fill="#34d399" class="vo-blink"/>
      <!-- caller header -->
      <circle cx="26" cy="48" r="13" fill="#10b981"/>
      <text x="26" y="52" fill="#022c22" font-family="Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">A</text>
      <rect x="46" y="40" width="76" height="7" rx="3.5" fill="#5eead4" fill-opacity="0.85"/>
      <rect x="46" y="52" width="54" height="5" rx="2.5" fill="#34d399" fill-opacity="0.45"/>
      <!-- voice waveform -->
      <g transform="translate(0,90)" fill="#5eead4">
        <rect x="22" y="-9" width="5" height="18" rx="2.5" class="vo-wave" style="animation-delay:0s;"/>
        <rect x="35" y="-15" width="5" height="30" rx="2.5" class="vo-wave" style="animation-delay:0.12s;"/>
        <rect x="48" y="-12" width="5" height="24" rx="2.5" class="vo-wave" style="animation-delay:0.24s;"/>
        <rect x="61" y="-18" width="5" height="36" rx="2.5" class="vo-wave" style="animation-delay:0.36s;"/>
        <rect x="74" y="-10" width="5" height="20" rx="2.5" class="vo-wave" style="animation-delay:0.18s;"/>
        <rect x="87" y="-16" width="5" height="32" rx="2.5" class="vo-wave" style="animation-delay:0.30s;"/>
        <rect x="100" y="-11" width="5" height="22" rx="2.5" class="vo-wave" style="animation-delay:0.42s;"/>
        <rect x="113" y="-14" width="5" height="28" rx="2.5" class="vo-wave" style="animation-delay:0.06s;"/>
        <rect x="126" y="-8" width="5" height="16" rx="2.5" class="vo-wave" style="animation-delay:0.5s;"/>
      </g>
      <!-- footer: live dot + timer -->
      <circle cx="18" cy="115" r="3.5" fill="#34d399" class="vo-blink"/>
      <text x="27" y="119" fill="#34d399" font-family="Arial, sans-serif" font-size="8" font-weight="600">LIVE</text>
      <rect x="120" y="108" width="36" height="15" rx="7.5" fill="#10b981" fill-opacity="0.18" stroke="#10b981" stroke-width="0.8" stroke-opacity="0.5"/>
      <text x="138" y="119" fill="#5eead4" font-family="Arial, sans-serif" font-size="9" font-weight="700" text-anchor="middle">0:42</text>
    </g>
  </g>

  <!-- ============ TOP-RIGHT CARD : CALL QUEUE ============ -->
  <g class="vo-float-delay">
    <g transform="translate(590,30)">
      <rect width="170" height="130" rx="12" fill="url(#vo-card)" stroke="#10b981" stroke-width="1" stroke-opacity="0.4"/>
      <text x="14" y="22" fill="#5eead4" font-family="Arial, sans-serif" font-size="9" font-weight="700" letter-spacing="1.5">CALL QUEUE</text>
      <rect x="116" y="11" width="42" height="14" rx="7" fill="#34d399" fill-opacity="0.18" stroke="#34d399" stroke-width="0.7" stroke-opacity="0.5"/>
      <text x="137" y="21" fill="#34d399" font-family="Arial, sans-serif" font-size="8" font-weight="700" text-anchor="middle">3 active</text>
      <!-- row 1 -->
      <g transform="translate(14,36)">
        <circle cx="11" cy="11" r="11" fill="#10b981"/><text x="11" y="15" fill="#022c22" font-family="Arial, sans-serif" font-size="10" font-weight="700" text-anchor="middle">S</text>
        <rect x="28" y="4" width="60" height="6" rx="3" fill="#5eead4" fill-opacity="0.8"/>
        <rect x="28" y="14" width="40" height="4" rx="2" fill="#34d399" fill-opacity="0.4"/>
        <rect x="100" y="4" width="42" height="15" rx="7.5" fill="#34d399" fill-opacity="0.2"/>
        <text x="121" y="14" fill="#34d399" font-family="Arial, sans-serif" font-size="7.5" font-weight="700" text-anchor="middle">Talking</text>
        <circle cx="92" cy="11" r="3" fill="#34d399" class="vo-blink"/>
      </g>
      <!-- row 2 -->
      <g transform="translate(14,66)">
        <circle cx="11" cy="11" r="11" fill="#0ea5e9"/><text x="11" y="15" fill="#022c22" font-family="Arial, sans-serif" font-size="10" font-weight="700" text-anchor="middle">R</text>
        <rect x="28" y="4" width="52" height="6" rx="3" fill="#5eead4" fill-opacity="0.8"/>
        <rect x="28" y="14" width="34" height="4" rx="2" fill="#34d399" fill-opacity="0.4"/>
        <rect x="100" y="4" width="42" height="15" rx="7.5" fill="#0ea5e9" fill-opacity="0.2"/>
        <text x="121" y="14" fill="#7dd3fc" font-family="Arial, sans-serif" font-size="7.5" font-weight="700" text-anchor="middle">Ringing</text>
      </g>
      <!-- row 3 -->
      <g transform="translate(14,96)">
        <circle cx="11" cy="11" r="11" fill="#f59e0b"/><text x="11" y="15" fill="#022c22" font-family="Arial, sans-serif" font-size="10" font-weight="700" text-anchor="middle">M</text>
        <rect x="28" y="4" width="58" height="6" rx="3" fill="#5eead4" fill-opacity="0.8"/>
        <rect x="28" y="14" width="38" height="4" rx="2" fill="#34d399" fill-opacity="0.4"/>
        <rect x="96" y="4" width="46" height="15" rx="7.5" fill="#f59e0b" fill-opacity="0.2"/>
        <text x="119" y="14" fill="#fcd34d" font-family="Arial, sans-serif" font-size="7" font-weight="700" text-anchor="middle">Qualified</text>
      </g>
    </g>
  </g>

  <!-- ============ BOTTOM-LEFT CARD : QA SCORE ============ -->
  <g class="vo-float-delay">
    <g transform="translate(40,340)">
      <rect width="170" height="130" rx="12" fill="url(#vo-card)" stroke="#10b981" stroke-width="1" stroke-opacity="0.4"/>
      <text x="14" y="22" fill="#5eead4" font-family="Arial, sans-serif" font-size="9" font-weight="700" letter-spacing="1.5">QA SCORE</text>
      <rect x="124" y="11" width="34" height="14" rx="7" fill="#34d399" fill-opacity="0.18" stroke="#34d399" stroke-width="0.7" stroke-opacity="0.5"/>
      <text x="141" y="21" fill="#34d399" font-family="Arial, sans-serif" font-size="8" font-weight="700" text-anchor="middle">DONE</text>
      <!-- big number -->
      <text x="40" y="78" fill="#5eead4" font-family="Arial, sans-serif" font-size="44" font-weight="800" text-anchor="middle">96</text>
      <text x="40" y="94" fill="#34d399" font-family="Arial, sans-serif" font-size="8" font-weight="600" text-anchor="middle" fill-opacity="0.7">/ 100</text>
      <!-- labeled bars -->
      <g transform="translate(74,40)">
        <text x="0" y="8" fill="#34d399" font-family="Arial, sans-serif" font-size="7" fill-opacity="0.75">Script adherence</text>
        <rect x="0" y="12" width="84" height="6" rx="3" fill="#10b981" fill-opacity="0.15"/>
        <rect x="0" y="12" width="78" height="6" rx="3" fill="#34d399" style="transform-origin:left center; animation:vo-barx 1.6s ease-in-out infinite alternate;"/>
        <text x="0" y="36" fill="#34d399" font-family="Arial, sans-serif" font-size="7" fill-opacity="0.75">Sentiment</text>
        <rect x="0" y="40" width="84" height="6" rx="3" fill="#10b981" fill-opacity="0.15"/>
        <rect x="0" y="40" width="70" height="6" rx="3" fill="#5eead4" style="transform-origin:left center; animation:vo-barx 1.6s ease-in-out infinite alternate 0.3s;"/>
        <text x="0" y="64" fill="#34d399" font-family="Arial, sans-serif" font-size="7" fill-opacity="0.75">Compliance</text>
        <rect x="0" y="68" width="84" height="6" rx="3" fill="#10b981" fill-opacity="0.15"/>
        <rect x="0" y="68" width="82" height="6" rx="3" fill="#34d399" style="transform-origin:left center; animation:vo-barx 1.6s ease-in-out infinite alternate 0.6s;"/>
      </g>
    </g>
  </g>

  <!-- ============ BOTTOM-RIGHT CARD : OUTCOME ROUTING ============ -->
  <g class="vo-float">
    <g transform="translate(590,340)">
      <rect width="170" height="130" rx="12" fill="url(#vo-card)" stroke="#10b981" stroke-width="1" stroke-opacity="0.4"/>
      <text x="14" y="22" fill="#5eead4" font-family="Arial, sans-serif" font-size="9" font-weight="700" letter-spacing="1.5">OUTCOME ROUTING</text>
      <circle cx="129" cy="18" r="3" fill="#34d399" class="vo-blink"/>
      <text x="137" y="21" fill="#34d399" font-family="Arial, sans-serif" font-size="8" font-weight="700">LIVE</text>
      <!-- row 1 -->
      <g transform="translate(14,38)">
        <circle cx="9" cy="9" r="9" fill="#34d399"/><path d="M 5 9 l 2.5 2.5 l 4.5 -5" fill="none" stroke="#022c22" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="24" y="2" width="74" height="6.5" rx="3.25" fill="#5eead4" fill-opacity="0.8"/>
        <rect x="24" y="12" width="42" height="4" rx="2" fill="#34d399" fill-opacity="0.4"/>
        <rect x="110" y="2" width="34" height="15" rx="7.5" fill="#34d399" fill-opacity="0.2"/>
        <text x="127" y="12.5" fill="#34d399" font-family="Arial, sans-serif" font-size="7.5" font-weight="700" text-anchor="middle">AUTO</text>
      </g>
      <!-- row 2 -->
      <g transform="translate(14,70)">
        <circle cx="9" cy="9" r="9" fill="#0ea5e9"/><path d="M 5 9 h 8 M 9.5 5.5 l 3.5 3.5 l -3.5 3.5" fill="none" stroke="#022c22" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="24" y="2" width="68" height="6.5" rx="3.25" fill="#5eead4" fill-opacity="0.8"/>
        <rect x="24" y="12" width="38" height="4" rx="2" fill="#34d399" fill-opacity="0.4"/>
        <rect x="110" y="2" width="34" height="15" rx="7.5" fill="#0ea5e9" fill-opacity="0.2"/>
        <text x="127" y="12.5" fill="#7dd3fc" font-family="Arial, sans-serif" font-size="7.5" font-weight="700" text-anchor="middle">HIGH</text>
      </g>
      <!-- row 3 -->
      <g transform="translate(14,102)">
        <circle cx="9" cy="9" r="9" fill="#f59e0b"/><path d="M 6 6.5 a 4 4 0 1 0 6 0 M 9 4 v 5" fill="none" stroke="#022c22" stroke-width="1.5" stroke-linecap="round"/>
        <rect x="24" y="2" width="72" height="6.5" rx="3.25" fill="#5eead4" fill-opacity="0.8"/>
        <rect x="24" y="12" width="40" height="4" rx="2" fill="#34d399" fill-opacity="0.4"/>
        <rect x="110" y="2" width="34" height="15" rx="7.5" fill="#f59e0b" fill-opacity="0.2"/>
        <text x="127" y="12.5" fill="#fcd34d" font-family="Arial, sans-serif" font-size="7.5" font-weight="700" text-anchor="middle">LIVE</text>
      </g>
    </g>
  </g>

  <!-- ============ TRAVELLING PACKETS ============ -->
  <g><use href="#vo-packet-call"/><animateMotion dur="3.2s" repeatCount="indefinite" keyPoints="0;1" keyTimes="0;1" calcMode="linear"><mpath href="#vo-p1"/></animateMotion><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="3.2s" repeatCount="indefinite"/></g>
  <g><use href="#vo-packet-call"/><animateMotion dur="3.6s" begin="0.8s" repeatCount="indefinite" keyPoints="0;1" keyTimes="0;1" calcMode="linear"><mpath href="#vo-p2"/></animateMotion><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="3.6s" begin="0.8s" repeatCount="indefinite"/></g>
  <g><use href="#vo-packet-call"/><animateMotion dur="3.4s" begin="1.6s" repeatCount="indefinite" keyPoints="0;1" keyTimes="0;1" calcMode="linear"><mpath href="#vo-p3"/></animateMotion><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="3.4s" begin="1.6s" repeatCount="indefinite"/></g>
  <g><use href="#vo-packet-call"/><animateMotion dur="3.8s" begin="2.4s" repeatCount="indefinite" keyPoints="0;1" keyTimes="0;1" calcMode="linear"><mpath href="#vo-p4"/></animateMotion><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="3.8s" begin="2.4s" repeatCount="indefinite"/></g>

  <!-- ============ CENTRAL HUB ============ -->
  <g transform="translate(400,250)">
    <circle cx="0" cy="0" r="95" fill="url(#vo-hub-glow)"/>
    <circle cx="0" cy="0" r="46" fill="none" stroke="#5eead4" stroke-width="1.5" stroke-opacity="0.5" class="vo-pulse"/>
    <circle cx="0" cy="0" r="46" fill="none" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.5" class="vo-pulse" style="animation-delay:0.86s;"/>
    <circle cx="0" cy="0" r="46" fill="none" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.5" class="vo-pulse" style="animation-delay:1.72s;"/>
  </g>
  <g class="vo-orbit"><circle cx="400" cy="250" r="62" fill="none" stroke="#5eead4" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="3 7"/><circle cx="400" cy="188" r="2.5" fill="#5eead4"/><circle cx="462" cy="250" r="2" fill="#34d399"/></g>
  <g transform="translate(400,250)">
    <circle cx="0" cy="0" r="42" fill="url(#vo-hub)" filter="url(#vo-glow)"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#5eead4" stroke-width="1.2" stroke-opacity="0.6"/>
    <!-- white handset glyph -->
    <path d="M -13 -11 C -16 -11 -18 -8 -16 -5 C -11 5 -1 15 9 20 C 12 21.5 16 19.5 17 16.5 L 19 10 C 19.6 8 18.6 6 16.6 5.4 L 9.5 3.2 C 7.8 2.7 6 3.4 5 4.9 L 3.6 7 C -2 4 -7 -1 -10 -6.6 L -8 -8 C -6.5 -9 -5.8 -10.8 -6.3 -12.5 L -8.5 -19.6 C -9.1 -21.6 -11.1 -22.6 -13.1 -22 L -19.5 -20 C -22.5 -19 -24.5 -15 -23 -12" fill="#fff" transform="translate(2,-1) scale(0.92)"/>
    <text x="0" y="72" fill="#5eead4" font-family="Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="2" text-anchor="middle">VOICE CORE</text>
  </g>

  <!-- ============ BOTTOM STATS STRIP ============ -->
  <g transform="translate(400,486)" font-family="Arial, sans-serif" text-anchor="middle">
    <text x="-150" y="0" fill="#5eead4" font-size="10" font-weight="700">24/7 <tspan fill="#34d399" fill-opacity="0.7" font-weight="500">COVERAGE</tspan></text>
    <circle cx="-58" cy="-3" r="1.6" fill="#34d399"/>
    <text x="8" y="0" fill="#5eead4" font-size="10" font-weight="700">96% <tspan fill="#34d399" fill-opacity="0.7" font-weight="500">QA SCORE</tspan></text>
    <circle cx="74" cy="-3" r="1.6" fill="#34d399"/>
    <text x="150" y="0" fill="#5eead4" font-size="10" font-weight="700">AUTO <tspan fill="#34d399" fill-opacity="0.7" font-weight="500">ROUTING</tspan></text>
  </g>
</svg>
